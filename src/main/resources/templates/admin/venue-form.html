<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}" lang="">
<head><title>Venue Form</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4" th:text="${venue != null} ? 'Edit Venue' : 'Add Venue'"></h2>
            <form th:action="@{${venue != null ? '/admin/venues/' + venue.id + '/edit' : '/admin/venues/new'}}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control"
                           th:value="${venue?.name}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">-- Select category --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name()}"
                                th:text="${cat.label}"
                                th:selected="${venue != null and venue.category == cat}">
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control"
                              rows="3" th:text="${venue?.description}"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Photo</label>

                    <div th:if="${venue != null and venue.photoUrl != null}" class="mb-2">
                        <img th:src="${venue.photoUrl}" alt="Current photo"
                             style="height:120px; object-fit:cover; border-radius:8px;"/>
                        <p class="text-muted small mt-1">Current photo</p>
                    </div>

                    <label class="form-label small text-muted">Upload from device</label>
                    <input type="file" name="photoFile" class="form-control mb-2" accept="image/*"/>

                    <label class="form-label small text-muted">Or paste an image URL</label>
                    <input type="text" name="photoUrl" class="form-control"
                           th:value="${venue?.photoUrl}" placeholder="https://..."/>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="any" name="latitude" class="form-control"
                               th:value="${venue?.latitude}" required/>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="any" name="longitude" class="form-control"
                               th:value="${venue?.longitude}" required/>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark">Save</button>
                <a th:href="@{/admin/venues}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
