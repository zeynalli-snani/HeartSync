<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}" lang="">
<head><title>Venue Form</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4" th:text="${venue != null} ? 'Edit Venue' : 'Add Venue'"></h2>
            <form th:action="@{${venue != null ? '/admin/venues/' + venue.id + '/edit' : '/admin/venues/new'}}" method="post">
            <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control"
                           th:value="${venue?.name}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control"
                           th:value="${venue?.category}"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control"
                              rows="3" th:text="${venue?.description}"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Photo URL</label>
                    <input type="text" name="photoUrl" class="form-control"
                           th:value="${venue?.photoUrl}"/>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="any" name="latitude" class="form-control"
                               th:value="${venue?.latitude}" required/>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="any" name="longitude" class="form-control"
                               th:value="${venue?.longitude}" required/>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark">Save</button>
                <a th:href="@{/admin/venues}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
