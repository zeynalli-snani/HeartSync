<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Plan Detail</title></head>
<body>
<div layout:fragment="content">
    <div class="mb-3">
        <a th:href="@{/plans}" class="btn btn-outline-secondary btn-sm">← Back to Plans</a>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${plan.title}"></h2>
        <span th:if="${plan.completed}" class="badge bg-success fs-6">Completed</span>
    </div>
    <p class="text-muted" th:text="${plan.date}"></p>
    <p th:text="${plan.description}"></p>

    <div class="mb-4">
        <h5>Partner</h5>

        <div th:if="${plan.partner != null}">
        <span class="badge bg-danger text-white fs-6"
              th:text="${plan.partner.fullName}"></span>
            <form th:if="${plan.partner.username == currentUser.username}"
                  th:action="@{/plans/{id}/leave(id=${plan.id})}"
                  method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-danger"
                        onclick="return confirm('Leave this plan?')">Leave plan</button>
            </form>
        </div>

        <div th:if="${plan.partner == null and plan.owner.username == currentUser.username}">
            <form th:action="@{/plans/{id}/invite(id=${plan.id})}" method="post"
                  class="d-flex gap-2 mt-2">
                <input type="text" name="partnerUsername" class="form-control w-auto"
                       placeholder="Enter username to invite"/>
                <button type="submit" class="btn btn-sm btn-outline-dark">Send Invite</button>
            </form>
        </div>

        <div th:if="${plan.partner == null and plan.owner.username != currentUser.username}">
            <span class="text-muted small">No partner yet.</span>
        </div>
    </div>

    <ul class="list-group mb-3">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            th:each="stop : ${plan.stops}">
        <span>
            <strong th:text="${stop.timeSlot}"></strong> —
            <span th:if="${stop.venue != null}" th:text="${stop.venue.name}"></span>
            <span th:if="${stop.venue == null}" th:text="${stop.customVenueName}"></span>
            <small class="text-muted ms-1"
                   th:if="${stop.venue != null}"
                   th:text="${stop.venue.category}"></small>
        </span>
            <form th:action="@{/plans/{id}/stops/{stopId}/remove(id=${plan.id},stopId=${stop.id})}"
                  method="post">
                <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
            </form>
        </li>
    </ul>

    <p class="fw-semibold mb-1">Add from venue catalog</p>
    <form th:action="@{/plans/{id}/stops/add(id=${plan.id})}" method="post" class="row g-2 mb-3">
        <div class="col-auto">
            <select name="venueId" class="form-select">
                <option th:each="venue : ${venues}"
                        th:value="${venue.id}"
                        th:text="${venue.name}"></option>
            </select>
        </div>
        <div class="col-auto">
            <input type="time" name="timeSlot" class="form-control"/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-dark">Add</button>
        </div>
    </form>

    <p class="fw-semibold mb-1">Or add a custom spot</p>
    <form th:action="@{/plans/{id}/stops/add-custom(id=${plan.id})}" method="post" class="row g-2">
        <div class="col-auto">
            <input type="text" name="customVenueName" class="form-control"
                   placeholder="e.g. Zefer Parki"/>
        </div>
        <div class="col-auto">
            <input type="time" name="timeSlot" class="form-control"/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-dark">Add</button>
        </div>
    </form>

    <div class="mb-4" th:unless="${plan.completed}">
        <form th:action="@{/plans/{id}/complete(id=${plan.id})}" method="post">
            <button type="submit" class="btn btn-success">Mark as Completed</button>
        </form>
    </div>

    <div th:if="${plan.completed}" class="mb-4">
        <h5>Reflection</h5>
        <div th:if="${reflection != null}">
            <p><strong>Notes:</strong> <span th:text="${reflection.notes}"></span></p>
            <p><strong>Rating:</strong> <span th:text="${reflection.rating}"></span> / 5</p>
        </div>
        <form th:action="@{/plans/{id}/reflection(id=${plan.id})}" method="post" th:if="${reflection == null}">
            <div class="mb-2">
                <textarea name="notes" class="form-control" rows="3" placeholder="How did it go?"></textarea>
            </div>
            <div class="mb-2">
                <input type="number" name="rating" class="form-control w-auto"
                       min="1" max="5" placeholder="Rating (1-5)"/>
            </div>
            <button type="submit" class="btn btn-outline-dark">Save Reflection</button>
        </form>
    </div>

    <div th:if="${plan.owner.username == currentUser.username}">
        <form th:action="@{/plans/{id}/delete(id=${plan.id})}" method="post">
            <button type="submit" class="btn btn-outline-danger btn-sm"
                    onclick="return confirm('Delete this plan?')">Delete Plan</button>
        </form>
    </div>
</div>
</body>
</html>
