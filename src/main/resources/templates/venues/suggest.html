<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}" lang="">
<head><title>Suggest a Venue</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Suggest a Venue</h2>
            <p class="text-muted">Your suggestion will be reviewed by an admin before appearing on the map.</p>
            <form th:action="@{/venues/suggest}" method="post">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" placeholder="e.g. Dinner, Outdoor, Cinema"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Photo URL</label>
                    <input type="text" name="photoUrl" class="form-control"/>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="any" name="latitude" class="form-control" required/>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="any" name="longitude" class="form-control" required/>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark">Submit Suggestion</button>
                <a th:href="@{/map}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
